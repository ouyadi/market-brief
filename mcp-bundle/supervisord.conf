; Single-container fan-out: one supervisord runs 5 FastMCP processes,
; each on its own port. All bind 0.0.0.0 via MCP_HOST env so Coolify
; Traefik / sibling containers can reach them on the coolify network.
; SECURITY (audit I1): set MCP_SHARED_SECRET in the Coolify env to require an
; `Authorization: Bearer <secret>` on every request (opt-in via mcp/_mcp_auth.py;
; unset = no auth, unchanged). The SAME secret must be set on the alphalens
; service so its MCP client sends it.
;
; Logs all funnel to stdout/stderr → Coolify's container log UI shows
; the joined stream (one container, all 5 services).

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[unix_http_server]
file=/tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; -------- per-service programs --------
; Stdout/stderr go to /dev/fd/1 + /dev/fd/2 → docker logs visible.
; autorestart catches transient API crashes; startsecs prevents flap loop.

[program:fred]
command=python -u /app/mcp/fred_mcp.py
directory=/app
environment=MCP_HOST="0.0.0.0",FRED_MCP_PORT="3035"
autorestart=true
startsecs=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stdout_events_enabled=true
stderr_events_enabled=true

